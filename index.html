<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小龍的魔法書</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4a4e69; /* 稍微深一點的魔法書色調 */
            --accent: #9a8c98;
            --bg: #f2e9e4;
        }

        body { font-family: "Microsoft JhengHei", sans-serif; margin: 0; background: var(--bg); color: #222; overflow-x: hidden; }

        header {
            background: rgba(74, 78, 105, 0.9);
            backdrop-filter: blur(10px);
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 1.5rem; font-weight: bold; letter-spacing: 2px; }
        .nav { display: flex; list-style: none; }
        .dropdown { position: relative; margin-left: 20px; cursor: pointer; padding: 10px; font-weight: bold; }
        .dropdown-content { 
            display: none; position: absolute; background: white; 
            min-width: 150px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border-radius: 8px; top: 45px; right: 0;
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a { color: #333; padding: 12px; display: block; text-decoration: none; border-bottom: 1px solid #eee; font-size: 14px; }

        .hero-section { padding: 40px 0; background: #fff; }
        .swiper { width: 90%; max-width: 800px; height: 500px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .swiper-slide { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; }
        .swiper-slide img { width: 100%; height: 80%; object-fit: contain; }
        .slide-btn { 
            background: var(--primary); color: white; padding: 10px 25px; 
            text-decoration: none; border-radius: 50px; margin-top: 15px; font-weight: bold;
        }

        .container { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 8px solid var(--primary); transition: 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .tag { background: var(--accent); color: white; padding: 4px 12px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        .btn-link { display: inline-block; margin-top: 15px; color: var(--primary); font-weight: bold; text-decoration: none; }

        footer { text-align: center; padding: 40px; background: var(--primary); color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo">✨ 小龍的魔法書</div>
    <div class="nav">
        <div class="dropdown">課程魔法分類 ▾
            <div class="dropdown-content">
                <a href="#">國文</a><a href="#">數學</a><a href="#">英文</a>
                <a href="#">地理</a><a href="#">公民</a><a href="#">化學</a>
                <a href="#">地科</a><a href="#">物理</a><a href="#">生物</a>
            </div>
        </div>
    </div>
</header>

<section class="swiper-section" data-aos="fade-down">
    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <img src="https://upload.cc/i1/2024/04/10/Jm5v8G.png" alt="蔬果加工">
                <a href="https://s10.aconvert.com/convert/p3r68-cdx67/acke8-03xro.html" target="_blank" class="slide-btn">開啟：自主學習 蔬果加工</a>
            </div>
            <div class="swiper-slide">
                <img src="https://upload.cc/i1/2024/04/10/Jm5v8G.png" alt="英文戲劇">
                <a href="https://s10.aconvert.com/convert/p3r68-cdx67/a2cop-ii8wl.html" target="_blank" class="slide-btn">開啟：英文戲劇專案</a>
            </div>
            <div class="swiper-slide">
                <img src="https://upload.cc/i1/2024/04/10/Jm5v8G.png" alt="副食品分析">
                <a href="https://s10.aconvert.com/convert/p3r68-cdx67/as8zc-vobor.html" target="_blank" class="slide-btn">開啟：副食品分析報告</a>
            </div>
            <div class="swiper-slide">
                <img src="https://upload.cc/i1/2024/04/10/Jm5v8G.png" alt="歷史">
                <a href="https://canva.link/3gydso53e81s9it" target="_blank" class="slide-btn">開啟：歷史校外教學</a>
            </div>
        </div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>
</section>

<div class="container">
    <h2 style="text-align: center; margin-bottom: 40px;" data-aos="fade-up">魔法書目次</h2>
    <div class="grid">
        <div class="card" data-aos="fade-up" data-aos-delay="100">
            <span class="tag">加工實務</span>
            <h3>蔬果加工報告</h3>
            <p>詳細紀錄蔬果加工過程與實驗觀察結果。</p>
            <a href="https://s10.aconvert.com/convert/p3r68-cdx67/acke8-03xro.html" target="_blank" class="btn-link">翻閱魔法書 →</a>
        </div>
        <div class="card" data-aos="fade-up" data-aos-delay="200">
            <span class="tag">英文</span>
            <h3>英文戲劇專案</h3>
            <p>口說練習與戲劇腳本的完整呈現。</p>
            <a href="https://s10.aconvert.com/convert/p3r68-cdx67/a2cop-ii8wl.html" target="_blank" class="btn-link">翻閱魔法書 →</a>
        </div>
        <div class="card" data-aos="fade-up" data-aos-delay="300">
            <span class="tag">生物/營養</span>
            <h3>副食品分析</h3>
            <p>專業營養成分與幼兒副食品的深度探討。</p>
            <a href="https://s10.aconvert.com/convert/p3r68-cdx67/as8zc-vobor.html" target="_blank" class="btn-link">翻閱魔法書 →</a>
        </div>
    </div>
</div>

<footer>
    ✨ 小龍的魔法書 | 2026 學習歷程檔案 ✨
</footer>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>
    AOS.init({ duration: 1000, once: false });
    const swiper = new Swiper('.swiper', {
        loop: true,
        autoplay: { delay: 4000 },
        pagination: { el: '.swiper-pagination', clickable: true },
        navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
    });
</script>

</body>
</html>
